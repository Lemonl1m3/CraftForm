
#╔══════════════════════════════════════════════════════════════════════════════╗
#║                                  CraftForm                                   ║
#╠══════════════════════════════════════════════════════════════════════════════╣
#║  GITHUB ACTIONS  ::  release.yaml                                            ║
#║  Builds the operations + startup lambda zips and publishes them              ║
#║  as GitHub release assets for the bootstrap stager to pull. The workflow is  ║
#║  not heavy enough to qualify for a matrix approach                           ║
#╚══════════════════════════════════════════════════════════════════════════════╝


name: Lambda Release Workflow


#============================================================
#                 TRIGGER SETTINGS
#============================================================
on:

  # MANUAL TRIGGER: allow manual triggers and require a version number input for the release
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the release (e.g., v1.2.3)'
        required: true
      prerelease:
        description: 'Set to TRUE if it is a prerelease'
        type: boolean
        default: false

  # AUTOMATIC TRIGGER: trigger on new version tags being pushed in the repo      
  push:
    tags: ['v*.*.*'] # trigger on version tags like v1.2.3

# GIT PERMISSIONS: allow the git token to write to repo
permissions:
  contents: write    # needed to create releases and upload assets



#============================================================
#                 JOB EXECUTION
#============================================================

jobs:

  # RELEASE JOB: job for building the the lambda code, creating new releases, and uploading the built lambda code
  release:
    if: github.repository == 'Liamade/CraftForm' # only run this workflow in the main repo, not in forks
    runs-on: ubuntu-latest

    steps:

      # CHECKOUT AND SETUP: check out the code
      - name: Checkout Repository 
        uses: actions/checkout@v6

      # PYTHON SETUP: set up python 3.12 for building the lambda code
      - name: Set up Python 
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'


      # BUILD LAMBDA CODE: install dependencies and build the lambda code into a zip file for distribution
      - name: Build Lambda Code
        run: |
          # BUILD OUT THE LAMBDA CODE
          for function in startup operations; do
            

            # DEPENDENCIES -- install required dependencies from the requirements.txt
            pip install -r lambda/$function/requirements.txt -t lambda-build/$function 
            
            # COPY DIRECTORY -- copy everthing except certain files 
            rsync -a \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.mypy_cache' \
              --exclude='requirements*.txt' \
              --exclude='requirements-dev.txt' \
              lambda/$function/ lambda-build/$function/

            # ZIP FILES -- zip files to make an actual release
            (
              cd lambda-build/$function
              zip -r ../../$function.zip .
            )

          done

      # CREATE GITHUB RELEASE: create a new release in GitHub using the version number from the workflow input
      - name: Publish Release
        id: release  # capture the output of this step to get the release ID
        uses: softprops/action-gh-release@v3
        with:
          name: CraftForm ${{ inputs.version || github.ref_name }} # set the release name
          tag_name: ${{ inputs.version || github.ref_name }} # set the tag name to the version tag
          target_commitish: ${{ github.sha }} # set the target commit for the release to the current commit that triggered the workflow
          generate_release_notes: true # let the action generate release notes based on merged PRs and commits
          fail_on_unmatched_files: true # fail if the files to upload are not found
          
          files: |
            startup.zip
            operations.zip
  
