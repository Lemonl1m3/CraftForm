

name: TF - Deploy AWS Region Infrastructure

#============================================================
#                 TRIGGER SETTINGS
#============================================================
on:
  # MANUAL TRIGGER - lets lambda hit it with github's REST API 
  workflow_dispatch: 
    inputs:
      # specifies which region terraform will be working in
      region:
        description: "The region the Infra will be deployed to (don't manual trigger unless you know what you're doing)"
        required: true
        type: string

      # whether the workflow is going to create or destroy basically
      action:
        type: choice
        options: [destroy, create]
        default: create

      application_id:
        type: string
        description: "The Discord Bot ID"
      
      interaction_token:
        type: string
        description: "The Session ID of the Discord Interaction"

# CONCURRENCY - make sure two jobs in the same region don't happen at the same time and get funky
concurrency:
  group: terraform-${{ inputs.region }}
  cancel-in-progress: false   # cancelling terraform in progress a big no no (trust me)

# PERMISSIONS 
permissions:
  id-token: write   # needed to get a JWT from github to prove who the runner is -- basically a passport
  contents: read

#============================================================
#                 JOB EXECUTION
#============================================================

jobs:

 # ---------------------------------------------------------- 
 #                      TERRAFORM
 # ----------------------------------------------------------
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_home_region: ${{ vars.HOME_REGION }}   # control-plane region for shared SSM config


    steps:

    # AWS ROLE CONFIGURATION -- assume the AWS role for github actions and establish the initial "connection"
    - name: Assume AWS Role
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ vars.HOME_REGION }}

    # ==========================CHECKOUT REPO=========================
    - name: Checkout Terraform Repo
      uses: actions/checkout@v7

    # ========================SETUP TERRAFORM=========================
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false  # don't really need the wrapper for what this pipeline is being used for

    # =========================TERRAFORM INIT=========================
    - name: Terraform Init
      working-directory: terraform  # the directory to use
      run: |
        # bucket = state storage | key = per-region object path | region = where the bucket lives
        terraform init -input=false -lock-timeout=60s \
          -backend-config="bucket=${{ vars.STATE_BUCKET }}" \
          -backend-config="key=regions/${{ inputs.region }}/terraform.tfstate" \
          -backend-config="region=${{ vars.HOME_REGION }}"

    # =========================TERRAFORM PLAN=========================
    - name: Terraform Plan
      working-directory: terraform
      run: |
        FLAG=''     # simple flag based on if the run is a destroy or a create
        if [ "${{ inputs.action }}" = "destroy" ]; then FLAG="-destroy"; fi
        terraform plan $FLAG -out=tfplan -input=false


    # =========================TERRAFORM APPLY========================
    - name: Terraform Apply
      working-directory: terraform
      run: |
        terraform apply -input=false tfplan



# ---------------------------------------------------------- 
#                      TERRAFORM
# ----------------------------------------------------------

  discord:
    name: Discord Response
    runs-on: ubuntu-latest
    needs: [terraform]
    if: always()            # run even if terraform FAILED -- that's exactly when we need to report
    env:
      # the @original endpoint edits the deferred "thinking..." message we left the user on
      WEBHOOK: https://discord.com/api/v10/webhooks/${{ inputs.application_id }}/${{ inputs.interaction_token }}/messages/@original
      # pull inputs into env vars so they're never injected straight into a shell command
      REGION: ${{ inputs.region }}
      ACTION: ${{ inputs.action }}

    steps:

    # =========================SUCCESS=========================
    - name: Report Success
      if: needs.terraform.result == 'success'
      run: |
        MESSAGE="Region \`$REGION\` was ${ACTION}d successfully. :)"
        curl -X PATCH "$WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg content "$MESSAGE" '{content: $content}')"

    # =========================FAILURE=========================
    - name: Report Failure
      if: needs.terraform.result != 'success'
      run: |
        MESSAGE="Something went wrong while trying to $ACTION region \`$REGION\`. Check the workflow logs. :("
        curl -X PATCH "$WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg content "$MESSAGE" '{content: $content}')"

